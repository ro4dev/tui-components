<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alerts — Functional — OpenCode</title>
<link rel="stylesheet" href="style-function.css">
</head>
<body>
  <div class="container">
    <h1>[alerts] — Functional</h1>
    <p>Trigger alerts, dismiss them, see auto-dismiss behavior.</p>

    <div class="section">
      <h3>Trigger alerts</h3>
      <div class="controls">
        <button class="btn btn--info" onclick="createAlert('info')">[i] Info</button>
        <button class="btn btn--warn" onclick="createAlert('warning')">[!] Warning</button>
        <button class="btn btn--danger" onclick="createAlert('danger')">[x] Danger</button>
        <button class="btn btn--success" onclick="createAlert('success')">[✓] Success</button>
        <button class="btn" onclick="dismissAll()">Dismiss All</button>
      </div>
    </div>

    <div class="section">
      <h3>Active alerts</h3>
      <div id="alertContainer">
        <div class="alert alert-info">
          <button class="alert__close" onclick="dismissAlert(this)">[×]</button>
          <span class="alert__icon">[i]</span>
          <span class="alert__title">New version available</span>
          <span class="alert__body">OpenCode 2.4.0 is ready to install.</span>
        </div>
        <div class="alert alert-warning">
          <button class="alert__close" onclick="dismissAlert(this)">[×]</button>
          <span class="alert__icon">[!]</span>
          <span class="alert__title">Low disk space</span>
          <span class="alert__body">Less than 2 GB remaining.</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const alertData = {
      info: [
        ['New version available', 'OpenCode 2.4.0 is ready to install.'],
        ['Index rebuild started', '12,847 files queued for reindexing.'],
        ['Connection restored', 'Server reconnected after 3s downtime.'],
      ],
      warning: [
        ['Low disk space', 'Less than 2 GB remaining on /dev/sda1.'],
        ['High memory usage', 'Agent pool using 85% of allocated memory.'],
        ['Deprecated config key', 'agent.workers is deprecated. Use agent.pool_size.'],
      ],
      danger: [
        ['Build failed', 'TypeScript error in src/agent.ts:42'],
        ['Connection lost', 'Agent pool unreachable for 30s.'],
        ['Permission denied', 'Cannot write to ~/.opencode/config.yaml'],
      ],
      success: [
        ['Deploy complete', 'Production updated successfully.'],
        ['Index rebuilt', '12,847 files indexed in 4.2s.'],
        ['Agent started', 'Pool initialized with 4 workers.'],
      ]
    };

    function createAlert(type) {
      const container = document.getElementById('alertContainer');
      const msgs = alertData[type];
      const [title, body] = msgs[Math.floor(Math.random() * msgs.length)];
      const icons = { info: '[i]', warning: '[!]', danger: '[x]', success: '[✓]' };
      const div = document.createElement('div');
      div.className = `alert alert-${type}`;
      div.innerHTML = `
        <button class="alert__close" onclick="dismissAlert(this)">[×]</button>
        <span class="alert__icon">${icons[type]}</span>
        <span class="alert__title">${title}</span>
        <span class="alert__body">${body}</span>
      `;
      container.prepend(div);
      // Auto-dismiss for info/success after 5s
      if (type === 'info' || type === 'success') {
        setTimeout(() => dismissAlert(div.querySelector('.alert__close')), 5000);
      }
    }

    function dismissAlert(closeBtn) {
      const alert = closeBtn.closest('.alert');
      alert.classList.add('removing');
      setTimeout(() => alert.remove(), 300);
    }

    function dismissAll() {
      document.querySelectorAll('#alertContainer .alert').forEach(a => {
        a.classList.add('removing');
        setTimeout(() => a.remove(), 300);
      });
    }
  </script>
</body>
</html>
