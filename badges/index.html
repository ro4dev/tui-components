<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badges — OpenCode Components</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Badges & Status Indicators</h1>

    <div class="section">
      <h3>badge-status</h3>
      <div class="demo-row">
        <span class="badge-status badge-status--active">● active</span>
        <span class="badge-status badge-status--warning">● warning</span>
        <span class="badge-status badge-status--error">● error</span>
        <span class="badge-status badge-status--idle">● idle</span>
      </div>
    </div>

    <div class="section">
      <h3>badge-label</h3>
      <div class="demo-row">
        <span class="badge-label">v2.4.0</span>
        <span class="badge-label">typescript</span>
        <span class="badge-label">stable</span>
        <span class="badge-label">internal</span>
      </div>
    </div>

    <div class="section">
      <h3>badge-counter</h3>
      <div class="demo-spaced">
        <span>Notifications <span class="badge-counter">3</span></span>
        <span>Errors <span class="badge-counter">12</span></span>
        <span>Updates <span class="badge-counter">1</span></span>
      </div>
    </div>

    <div class="section">
      <h3>Combined — Status + Label + Counter</h3>
      <div class="demo-spaced">
        <span class="badge-status badge-status--active">● running</span>
        <span class="badge-label">agent-pool-1</span>
        <span class="badge-counter">4</span>
      </div>
    </div>
  </div>
</body>
</html>
