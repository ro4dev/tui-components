<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badges — TUI Components</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Badges</h1>
  <p>Status indicators, labels, and counters with interactive states</p>
</div>

<div class="section">
  <div class="section-title">Status Badges - Dot Variant (Click to Cycle)</div>
  <div class="badge-row">
    <span class="badge badge-active" data-state="active">Active</span>
    <span class="badge badge-warning" data-state="warning">Warning</span>
    <span class="badge badge-error" data-state="error">Error</span>
    <span class="badge badge-idle" data-state="idle">Idle</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Label Badges</div>
  <div class="badge-row">
    <span class="badge badge-label">Draft</span>
    <span class="badge badge-accent">Feature</span>
    <span class="badge badge-label">Bug Fix</span>
    <span class="badge badge-accent">Enhancement</span>
    <span class="badge badge-label">Documentation</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Counter Badges</div>
  <div class="badge-row">
    <span class="badge-counter">3</span>
    <span class="badge-counter">12</span>
    <span class="badge-counter">99+</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Interactive Counters</div>
  <div class="badge-row">
    <span class="counter-badge">
      <button class="counter-btn" data-action="counter" data-delta="-1">[-]</button>
      <span class="counter-value">0</span>
      <button class="counter-btn" data-action="counter" data-delta="1">[+]</button>
      <span style="margin-left: var(--spacing-xs); color: var(--body);">Tasks</span>
    </span>
    <span class="counter-badge">
      <button class="counter-btn" data-action="counter" data-delta="-1">[-]</button>
      <span class="counter-value">5</span>
      <button class="counter-btn" data-action="counter" data-delta="1">[+]</button>
      <span style="margin-left: var(--spacing-xs); color: var(--body);">Notifications</span>
    </span>
  </div>
</div>

<script>
const statusOrder = ['active', 'warning', 'error', 'idle'];
const statusConfig = {
  active: { cls: 'badge-active', text: 'Active' },
  warning: { cls: 'badge-warning', text: 'Warning' },
  error: { cls: 'badge-error', text: 'Error' },
  idle: { cls: 'badge-idle', text: 'Idle' }
};

document.addEventListener('click', (e) => {
  const badge = e.target.closest('.badge[data-state]');
  if (badge) {
    const current = badge.dataset.state;
    const idx = statusOrder.indexOf(current);
    const next = statusOrder[(idx + 1) % statusOrder.length];
    const config = statusConfig[next];
    badge.className = 'badge ' + config.cls;
    badge.dataset.state = next;
    badge.textContent = config.text;
    return;
  }
  const counterBtn = e.target.closest('[data-action="counter"]');
  if (counterBtn) {
    const badge = counterBtn.closest('.counter-badge');
    const valueEl = badge.querySelector('.counter-value');
    const delta = parseInt(counterBtn.dataset.delta);
    let val = parseInt(valueEl.textContent);
    val = Math.max(0, val + delta);
    valueEl.textContent = val;
    return;
  }
});
</script>

</body>
</html>
