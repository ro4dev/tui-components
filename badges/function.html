<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badges - OpenCode Design System</title>
<link rel="stylesheet" href="style-function.css">
</head>
<body>

<div class="header">
  <h1>Badges</h1>
  <p>Status indicators, labels, and counters with interactive states</p>
</div>

<div class="section">
  <div class="section-title">Status Badges (Click to Cycle)</div>
  <div class="badge-row">
    <span class="badge badge-active" onclick="cycleStatus(this)" data-state="active">
      [✓] Active
    </span>
    <span class="badge badge-warning" onclick="cycleStatus(this)" data-state="warning">
      [!] Warning
    </span>
    <span class="badge badge-error" onclick="cycleStatus(this)" data-state="error">
      [×] Error
    </span>
    <span class="badge badge-idle" onclick="cycleStatus(this)" data-state="idle">
      [∅] Idle
    </span>
  </div>
</div>

<div class="section">
  <div class="section-title">Label Badges</div>
  <div class="badge-row">
    <span class="badge badge-label">( ) Draft</span>
    <span class="badge badge-accent">(•) Feature</span>
    <span class="badge badge-label">( ) Bug Fix</span>
    <span class="badge badge-accent">(•) Enhancement</span>
    <span class="badge badge-label">( ) Documentation</span>
  </div>
</div>

<div class="section">
  <div class="section-title">Counter Badges</div>
  <div class="badge-row">
    <span class="counter-badge">
      <button class="counter-btn" onclick="changeCounter(this, -1)">[-]</button>
      <span class="counter-value">0</span>
      <button class="counter-btn" onclick="changeCounter(this, 1)">[+]</button>
      <span style="margin-left: var(--spacing-xs); color: var(--body);">Tasks</span>
    </span>
    <span class="counter-badge">
      <button class="counter-btn" onclick="changeCounter(this, -1)">[-]</button>
      <span class="counter-value">5</span>
      <button class="counter-btn" onclick="changeCounter(this, 1)">[+]</button>
      <span style="margin-left: var(--spacing-xs); color: var(--body);">Notifications</span>
    </span>
    <span class="counter-badge">
      <button class="counter-btn" onclick="changeCounter(this, -1)">[-]</button>
      <span class="counter-value">12</span>
      <button class="counter-btn" onclick="changeCounter(this, 1)">[+]</button>
      <span style="margin-left: var(--spacing-xs); color: var(--body);">Messages</span>
    </span>
  </div>
</div>

<div class="log">
  <div class="log-title">Action Log</div>
  <div id="log-entries"></div>
</div>

<script>
const statusOrder = ['active', 'warning', 'error', 'idle'];
const statusConfig = {
  active: { cls: 'badge-active', marker: '[✓]', text: 'Active' },
  warning: { cls: 'badge-warning', marker: '[!]', text: 'Warning' },
  error: { cls: 'badge-error', marker: '[×]', text: 'Error' },
  idle: { cls: 'badge-idle', marker: '[∅]', text: 'Idle' }
};

function cycleStatus(el) {
  const current = el.dataset.state;
  const idx = statusOrder.indexOf(current);
  const next = statusOrder[(idx + 1) % statusOrder.length];
  const config = statusConfig[next];

  el.className = 'badge ' + config.cls;
  el.dataset.state = next;
  el.innerHTML = config.marker + ' ' + config.text;

  logAction('Status changed to: ' + config.text);
}

function changeCounter(btn, delta) {
  const badge = btn.closest('.counter-badge');
  const valueEl = badge.querySelector('.counter-value');
  let val = parseInt(valueEl.textContent);
  val = Math.max(0, val + delta);
  valueEl.textContent = val;

  const label = badge.querySelector('span:last-child').textContent;
  logAction(label + ' counter: ' + (delta > 0 ? '+' : '') + delta + ' → ' + val);
}

function logAction(message) {
  const log = document.getElementById('log-entries');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = '> ' + message;
  log.prepend(entry);
  if (log.children.length > 10) {
    log.removeChild(log.lastChild);
  }
}
</script>

</body>
</html>
