<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatars - OpenCode Design System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Avatars [∅]</h1>
  <p>User avatars with initials and interactive user management</p>
</div>

<div class="section">
  <div class="section-title">Avatar Circle</div>
  <div class="size-row"><span class="size-label">Default 32px</span><div class="avatar-circle">J</div></div>
  <div class="size-row"><span class="size-label">Compact 24px</span><div class="avatar-circle compact">A</div></div>
</div>

<div class="section">
  <div class="section-title">User Pills</div>
  <div class="add-user-form">
    <h4>Add New User</h4>
    <div class="form-row">
      <input type="text" class="form-input" placeholder="Name (e.g., John Doe)">
      <input type="text" class="form-input" placeholder="Role (e.g., Developer)">
    </div>
    <button class="btn" data-action="add-user">[+] Add User</button>
  </div>
  <div class="user-list"></div>
  <div class="empty-state">No users added yet. Use the form above to add users.</div>
</div>

<div class="section">
  <div class="section-title">Static User Pills</div>
  <div style="display: flex; flex-wrap: wrap; gap: var(--spacing-sm);">
    <div class="user-pill">
      <div class="avatar-circle compact">J</div>
      <div class="user-info"><span class="user-name">Jane Doe</span><span class="user-role">Designer</span></div>
      <button class="remove-btn" data-action="remove-pill">[×]</button>
    </div>
    <div class="user-pill">
      <div class="avatar-circle compact">A</div>
      <div class="user-info"><span class="user-name">Alex Kim</span><span class="user-role">Developer</span></div>
      <button class="remove-btn" data-action="remove-pill">[×]</button>
    </div>
    <div class="user-pill">
      <div class="avatar-circle compact">S</div>
      <div class="user-info"><span class="user-name">Sara Miles</span><span class="user-role">Manager</span></div>
      <button class="remove-btn" data-action="remove-pill">[×]</button>
    </div>
  </div>
</div>

<script>
let userCount = 0;

function getInitial(name) {
  return name.charAt(0).toUpperCase();
}

document.addEventListener('click', (e) => {
  const action = e.target.dataset.action;
  if (action === 'add-user') {
    const form = e.target.closest('.add-user-form');
    const inputs = form.querySelectorAll('.form-input');
    const name = inputs[0].value.trim() || 'User ' + (++userCount);
    const role = inputs[1].value.trim() || 'Member';
    const initial = getInitial(name);
    const pill = document.createElement('div');
    pill.className = 'user-pill';
    pill.innerHTML = `<div class="avatar-circle compact">${initial}</div><div class="user-info"><span class="user-name">${name}</span><span class="user-role">${role}</span></div><button class="remove-btn" data-action="remove-pill">[×]</button>`;
    const list = document.querySelector('.user-list');
    list.appendChild(pill);
    inputs[0].value = '';
    inputs[1].value = '';
    document.querySelector('.empty-state').style.display = 'none';
  }
  if (action === 'remove-pill') {
    e.target.closest('.user-pill')?.remove();
    const list = document.querySelector('.user-list');
    document.querySelector('.empty-state').style.display = list.children.length === 0 ? 'block' : 'none';
  }
});
</script>
</body>
</html>
