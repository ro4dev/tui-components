<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatars — OpenCode Components</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Avatars & User Pills</h1>

    <div class="section">
      <h3>avatar-circle (default 32px)</h3>
      <div class="demo-row">
        <div class="avatar-circle avatar-circle--default">A</div>
        <div class="avatar-circle avatar-circle--default">B</div>
        <div class="avatar-circle avatar-circle--default">C</div>
        <div class="avatar-circle avatar-circle--default">D</div>
      </div>
    </div>

    <div class="section">
      <h3>avatar-circle (compact 24px)</h3>
      <div class="demo-row">
        <div class="avatar-circle avatar-circle--compact">A</div>
        <div class="avatar-circle avatar-circle--compact">B</div>
        <div class="avatar-circle avatar-circle--compact">C</div>
      </div>
    </div>

    <div class="section">
      <h3>user-pill</h3>
      <div class="demo-col">
        <div class="user-pill">
          <div class="avatar-circle avatar-circle--compact">R</div>
          <span class="user-pill__name">ro</span>
          <span class="user-pill__role">admin</span>
        </div>
        <div class="user-pill">
          <div class="avatar-circle avatar-circle--compact">A</div>
          <span class="user-pill__name">agent-1</span>
          <span class="user-pill__role">active</span>
        </div>
        <div class="user-pill">
          <div class="avatar-circle avatar-circle--compact">M</div>
          <span class="user-pill__name">maria</span>
          <span class="user-pill__role">contributor</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
