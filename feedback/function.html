<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - OpenCode Design System</title>
<link rel="stylesheet" href="style-function.css">
</head>
<body>

<div class="header">
  <h1>Feedback [!]</h1>
  <p>Toast notifications, skeleton loading, and inline validation</p>
</div>

<div class="section">
  <div class="section-title">Toast Notifications</div>
  <div class="btn-row">
    <button class="btn btn-info" onclick="showToast('info', '[i] Info: Operation completed successfully.')">[i] Info</button>
    <button class="btn btn-success" onclick="showToast('success', '[✓] Success: File saved to disk.')">[✓] Success</button>
    <button class="btn btn-error" onclick="showToast('error', '[!] Error: Failed to connect to server.')">[!] Error</button>
    <button class="btn btn-warning" onclick="showToast('warning', '[!] Warning: Disk space is low.')">[!] Warning</button>
  </div>
</div>

<div class="section skeleton-section">
  <div class="section-title">Skeleton Loading</div>
  <button class="btn-toggle" onclick="toggleSkeleton()">[←] Toggle Skeleton</button>
  <div class="skeleton-card" id="skeletonCard">
    <div class="skeleton-avatar"></div>
    <div class="skeleton-heading"></div>
    <div class="skeleton-line medium"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line short"></div>
  </div>
  <div class="skeleton-card" id="contentCard" style="display: none;">
    <div style="display: flex; gap: var(--spacing-md); margin-bottom: var(--spacing-md);">
      <div style="width: 32px; height: 32px; border-radius: var(--rounded-full); background: var(--accent); display: flex; align-items: center; justify-content: center; color: var(--on-dark); font-weight: 700;">JD</div>
      <div>
        <div style="font-size: 14px; color: var(--ink); font-weight: 500;">Jane Doe</div>
        <div style="font-size: 12px; color: var(--mute);">Software Engineer</div>
      </div>
    </div>
    <p style="font-size: 13px; color: var(--body); line-height: 1.6;">This is the loaded content after the skeleton animation completes. The user profile is now visible with all details.</p>
  </div>
</div>

<div class="section validation-section">
  <div class="section-title">Inline Validation</div>
  <div class="input-group">
    <label class="input-label">Email Address</label>
    <input type="text" class="input-field" id="emailInput" placeholder="user@example.com" oninput="validateEmail()">
    <div class="validation-msg error" id="emailError"></div>
    <div class="validation-msg success" id="emailSuccess"></div>
  </div>
  <div class="input-group">
    <label class="input-label">Username</label>
    <input type="text" class="input-field" id="usernameInput" placeholder="3-16 characters" oninput="validateUsername()">
    <div class="validation-msg error" id="usernameError"></div>
    <div class="validation-msg success" id="usernameSuccess"></div>
  </div>
  <div class="input-group">
    <label class="input-label">Password</label>
    <input type="password" class="input-field" id="passwordInput" placeholder="Min 8 characters" oninput="validatePassword()">
    <div class="validation-msg error" id="passwordError"></div>
    <div class="validation-msg success" id="passwordSuccess"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
function showToast(type, message) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-msg">${message}</span><button class="dismiss-btn" onclick="dismissToast(this)">[×]</button>`;
  container.appendChild(toast);

  if (type === 'info' || type === 'success') {
    setTimeout(() => { dismissToast(toast.querySelector('.dismiss-btn')); }, 5000);
  }
}

function dismissToast(btn) {
  const toast = btn.closest('.toast');
  toast.style.animation = 'slideOut 0.3s ease forwards';
  setTimeout(() => toast.remove(), 300);
}

function toggleSkeleton() {
  const skeleton = document.getElementById('skeletonCard');
  const content = document.getElementById('contentCard');
  skeleton.style.display = skeleton.style.display === 'none' ? 'block' : 'none';
  content.style.display = content.style.display === 'none' ? 'block' : 'none';
}

function validateEmail() {
  const input = document.getElementById('emailInput');
  const error = document.getElementById('emailError');
  const success = document.getElementById('emailSuccess');
  const val = input.value.trim();
  input.classList.remove('error', 'success');
  error.classList.remove('show'); success.classList.remove('show');

  if (!val) return;
  if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
    input.classList.add('success');
    success.textContent = '[✓] Valid email address';
    success.classList.add('show');
  } else {
    input.classList.add('error');
    error.textContent = '[!] Please enter a valid email address';
    error.classList.add('show');
  }
}

function validateUsername() {
  const input = document.getElementById('usernameInput');
  const error = document.getElementById('usernameError');
  const success = document.getElementById('usernameSuccess');
  const val = input.value.trim();
  input.classList.remove('error', 'success');
  error.classList.remove('show'); success.classList.remove('show');

  if (!val) return;
  if (val.length < 3) {
    input.classList.add('error');
    error.textContent = '[!] Username must be at least 3 characters';
    error.classList.add('show');
  } else if (val.length > 16) {
    input.classList.add('error');
    error.textContent = '[!] Username must be 16 characters or less';
    error.classList.add('show');
  } else {
    input.classList.add('success');
    success.textContent = '[✓] Username is available';
    success.classList.add('show');
  }
}

function validatePassword() {
  const input = document.getElementById('passwordInput');
  const error = document.getElementById('passwordError');
  const success = document.getElementById('passwordSuccess');
  const val = input.value;
  input.classList.remove('error', 'success');
  error.classList.remove('show'); success.classList.remove('show');

  if (!val) return;
  if (val.length < 8) {
    input.classList.add('error');
    error.textContent = '[!] Password must be at least 8 characters';
    error.classList.add('show');
  } else {
    input.classList.add('success');
    success.textContent = '[✓] Password strength: good';
    success.classList.add('show');
  }
}
</script>
</body>
</html>
