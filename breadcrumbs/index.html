<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breadcrumbs - OpenCode Design System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Breadcrumbs</h1>
  <p>Navigation breadcrumbs with path segments</p>
</div>

<div class="section">
  <div class="section-title">Breadcrumb Default</div>
  <div class="breadcrumb" data-breadcrumb>
    <span class="breadcrumb-item" data-action="navigate">home</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item" data-action="navigate">docs</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item" data-action="navigate">agents</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item active" data-action="navigate">configuration</span>
  </div>

  <div class="breadcrumb" data-breadcrumb>
    <span class="breadcrumb-item" data-action="navigate">dashboard</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item" data-action="navigate">settings</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item active" data-action="navigate">profile</span>
  </div>

  <div class="breadcrumb" data-breadcrumb>
    <span class="breadcrumb-item" data-action="navigate">root</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item" data-action="navigate">src</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item" data-action="navigate">components</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item" data-action="navigate">ui</span>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-item active" data-action="navigate">index.html</span>
  </div>
</div>

<script>
document.addEventListener('click', (e) => {
  const item = e.target.closest('[data-action="navigate"]');
  if (!item) return;
  const bc = item.closest('.breadcrumb');
  bc.querySelectorAll('.breadcrumb-item').forEach(i => i.classList.remove('active'));
  item.classList.add('active');
});
</script>

</body>
</html>
