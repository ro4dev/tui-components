<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tooltips - OpenCode Design System</title>
<link rel="stylesheet" href="style-function.css">
</head>
<body>

<div class="header">
  <h1>Tooltips</h1>
  <p>Hover-triggered tooltips with dark background and light text</p>
</div>

<div class="controls">
  <button class="tooltip-trigger" onmouseenter="logHover('Save')">
    [⌕] Save
    <span class="tooltip">Save current changes</span>
  </button>

  <button class="tooltip-trigger" onmouseenter="logHover('Copy')">
    [⎘] Copy
    <span class="tooltip">Copy to clipboard</span>
  </button>

  <button class="tooltip-trigger" onmouseenter="logHover('Delete')">
    [×] Delete
    <span class="tooltip">Permanently delete item</span>
  </button>

  <button class="tooltip-trigger" onmouseenter="logHover('Info')">
    [i] Info
    <span class="tooltip">View more information</span>
  </button>

  <button class="tooltip-trigger" onmouseenter="logHover('Warning')">
    [!] Warning
    <span class="tooltip">Proceed with caution</span>
  </button>

  <button class="tooltip-trigger" onmouseenter="logHover('Settings')">
    [∅] Settings
    <span class="tooltip">Open settings panel</span>
  </button>

  <button class="tooltip-trigger" onmouseenter="logHover('Navigate')">
    [→] Navigate
    <span class="tooltip">Go to next page</span>
  </button>

  <button class="tooltip-trigger" onmouseenter="logHover('Back')">
    [←] Back
    <span class="tooltip">Return to previous</span>
  </button>
</div>

<div class="info-box">
  <strong>Tooltip Specs</strong>
  Position: Below trigger element<br>
  Gap: 4px between trigger and tooltip<br>
  Background: #1A1A1A (surface-dark)<br>
  Text: #F5F2EB (on-dark)<br>
  Radius: 4px (rounded-sm)<br>
  Arrow: None — the rectangle itself is the tooltip
</div>

<div class="log">
  <div class="log-title">Hover Log</div>
  <div id="log-entries"></div>
</div>

<script>
function logHover(label) {
  const log = document.getElementById('log-entries');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = '> Tooltip shown: ' + label;
  log.prepend(entry);
  if (log.children.length > 10) {
    log.removeChild(log.lastChild);
  }
}
</script>

</body>
</html>
