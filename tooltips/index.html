<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltips — OpenCode Components</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Tooltips</h1>
    <p>Hover tooltips with dark backgrounds and no arrows.</p>

    <div class="section">
      <h3>tooltip-default</h3>
      <div class="demo-row">
        <div class="tooltip-demo">
          <button class="tooltip-trigger">[⎘] Copy</button>
          <div class="tooltip">Copy to clipboard</div>
        </div>

        <div class="tooltip-demo">
          <button class="tooltip-trigger">[x]</button>
          <div class="tooltip">Close panel</div>
        </div>

        <div class="tooltip-demo">
          <button class="tooltip-trigger">⟳</button>
          <div class="tooltip">Refresh index</div>
        </div>

        <div class="tooltip-demo">
          <button class="tooltip-trigger">⌘K</button>
          <div class="tooltip">Open command palette</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
