<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tooltips - OpenCode Design System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
  <h1>Tooltips</h1>
  <p>Hover or focus to trigger tooltips with dark background and light text</p>
</div>

<div class="controls">
  <button class="tooltip-trigger">
    [⌕] Save
    <span class="tooltip">Save current changes</span>
  </button>
  <button class="tooltip-trigger">
    [⎘] Copy
    <span class="tooltip">Copy to clipboard</span>
  </button>
  <button class="tooltip-trigger">
    [×] Delete
    <span class="tooltip">Permanently delete item</span>
  </button>
  <button class="tooltip-trigger">
    [i] Info
    <span class="tooltip">View more information</span>
  </button>
  <button class="tooltip-trigger">
    [!] Warning
    <span class="tooltip">Proceed with caution</span>
  </button>
  <button class="tooltip-trigger">
    [∅] Settings
    <span class="tooltip">Open settings panel</span>
  </button>
  <button class="tooltip-trigger">
    [→] Navigate
    <span class="tooltip">Go to next page</span>
  </button>
  <button class="tooltip-trigger">
    [←] Back
    <span class="tooltip">Return to previous</span>
  </button>
</div>

<script>
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const trigger = document.activeElement.closest('.tooltip-trigger');
    if (trigger) trigger.blur();
  }
});
</script>
</body>
</html>
